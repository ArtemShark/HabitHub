name: Coverage Reports

on:
  workflow_dispatch:
    inputs:
      run_frontend:
        description: "Generate frontend coverage report"
        required: true
        default: true
        type: boolean
      run_backend:
        description: "Generate backend coverage report"
        required: true
        default: true
        type: boolean

jobs:
  frontend-coverage:
    if: ${{ inputs.run_frontend }}
    name: Frontend Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm test -- --coverage --runInBand

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

  backend-coverage:
    if: ${{ inputs.run_backend }}
    name: Backend Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore backend dependencies
        run: dotnet restore

      - name: Run backend tests with coverage
        run: dotnet test HabitHub.Tests/HabitHub.Tests.csproj --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate backend HTML coverage report
        run: |
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"coverage-report-clean" \
            -reporttypes:"Html;TextSummary" \
            "-classfilters:+*;-HabitHub.Api.Migrations*;-Microsoft.AspNetCore.OpenApi.Generated*;-System.Runtime.CompilerServices*" \
            "-filefilters:+*;-**/obj/**;-**/*.generated.cs;-**/*.g.cs"

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage-report-clean/