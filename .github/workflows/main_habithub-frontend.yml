# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - habithub-frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run tests
        run: npm run test --if-present

      - name: Prepare deployment package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ../deploy-package
          Copy-Item -Recurse .next/standalone/* ../deploy-package/
          New-Item -ItemType Directory -Force -Path ../deploy-package/.next
          Copy-Item -Recurse .next/static ../deploy-package/.next/static
          if (Test-Path public) { Copy-Item -Recurse public ../deploy-package/public }

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy-package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_772DB3CE2BDC4BC3AC3EF7AF4674C903 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FD49AD5004584B9DA05A45479E70C13B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_72896B6DE12E40A38E4CAEAF8227FE01 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'habithub-frontend'
          slot-name: 'Production'
          package: deploy-package