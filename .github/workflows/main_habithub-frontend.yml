name: Build and deploy Node.js app to Azure Web App - habithub-frontend

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js
          test -d .next/static

      - name: Prepare standalone package
        run: |
          rm -rf deploy
          mkdir -p deploy/.next
          cp -r .next/standalone/* deploy/
          cp -r .next/static deploy/.next/static
          if [ -d public ]; then cp -r public deploy/public; fi
          if [ -f web.config ]; then cp web.config deploy/web.config; fi
          find deploy -maxdepth 3 -type f | sort

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_772DB3CE2BDC4BC3AC3EF7AF4674C903 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FD49AD5004584B9DA05A45479E70C13B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_72896B6DE12E40A38E4CAEAF8227FE01 }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: habithub-frontend
          package: frontend/deploy