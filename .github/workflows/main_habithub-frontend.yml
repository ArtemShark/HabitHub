name: Build and deploy Node.js app to Azure Web App - habithub-frontend

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://habithub-backend-dndna4fxckd9epby.westeurope-01.azurewebsites.net

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js
          test -f .next/standalone/package.json
          test -d .next/static

      - name: Prepare standalone package
        run: |
          rm -rf deploy
          cp -r .next/standalone deploy
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static
          cp -r .next/server deploy/.next/server
          cp .next/BUILD_ID deploy/.next/BUILD_ID
          if [ -d public ]; then cp -r public deploy/public; fi
          if [ -f web.config ]; then cp web.config deploy/web.config; fi

      - name: Verify deploy package
        run: |
          test -f deploy/server.js
          test -f deploy/package.json
          test -f deploy/.next/BUILD_ID
          test -d deploy/.next/server
          test -d deploy/.next/static

      - name: Patch package.json for Azure startup
        run: |
          node -e "const fs=require('fs'); const p='./deploy/package.json'; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.scripts=pkg.scripts||{}; pkg.scripts.start='node server.js'; fs.writeFileSync(p, JSON.stringify(pkg, null, 2)); console.log(fs.readFileSync(p,'utf8'));"

      - name: List deploy package contents
        run: |
          find deploy -maxdepth 4 -type f | sort
          du -sh deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_772DB3CE2BDC4BC3AC3EF7AF4674C903 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FD49AD5004584B9DA05A45479E70C13B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_72896B6DE12E40A38E4CAEAF8227FE01 }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: habithub-frontend
          package: frontend/deploy