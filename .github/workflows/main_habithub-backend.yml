name: Build and deploy ASP.Net Core app to Azure Web App - habithub-backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_habithub-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore
        working-directory: ./backend/HabitHub.Api

      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore
        working-directory: ./backend/HabitHub.Api

      - name: dotnet publish
        run: dotnet publish -c Release --no-build -o "${{env.DOTNET_ROOT}}/myapp"
        working-directory: ./backend/HabitHub.Api

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_25DE943A771C49178F88B499618F98F7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_66EC88E874334E05AEF9C83100D08AE4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C712C404E5BD4151A6168E62DF40601B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'habithub-backend'
          slot-name: 'Production'
          package: .